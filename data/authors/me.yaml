bio: |
  I am a PhD candidate in Education Policy and Program Evaluation (EPPE) at the
  Harvard Graduate School of Education. My research applies the tools of applied
  microeconomics to study education systems in low- and middle-income countries.
  I am particularly interested in understanding how teacher professional
  development programs and policies can improve teaching quality and student
  learning outcomes at the K-12 level.

  My current work examines teacher training interventions, school governance
  reforms, and parental engagement strategies in Pakistan, using experimental
  and quasi-experimental methods to identify what works, for whom, and why.

  Before Harvard, I managed large-scale education research at CERP Pakistan
  with Professor Asim Khwaja and worked on education campaigns and M&E across
  Pakistan. I hold a Master of Public Administration from Central European
  University and a B.Sc. in Mechanical Engineering from UET Lahore.

